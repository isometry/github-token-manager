                  x-kubernetes-validations:
                    - message:
                        extraData inline must not contain 'username' or 'password'
                        when basicAuth is true
                      rule:
                        "!has(self.extraData) || !(has(self.basicAuth) && self.basicAuth)
                        || self.extraData.all(e, !has(e.inline) || !('username' in e.inline
                        || 'password' in e.inline))"
                    - message:
                        extraData inline must not contain 'token' when basicAuth
                        is false
                      rule:
                        "!has(self.extraData) || (has(self.basicAuth) && self.basicAuth)
                        || self.extraData.all(e, !has(e.inline) || !('token' in e.inline))"
                    - message:
                        extraData inline keys must consist of alphanumerics, '-',
                        '_' or '.'
                      rule:
                        "!has(self.extraData) || self.extraData.all(e, !has(e.inline)
                        || e.inline.all(k, k.matches('^[-._a-zA-Z0-9]+$')))"
