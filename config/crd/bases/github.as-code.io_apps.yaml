---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: apps.github.as-code.io
spec:
  group: github.as-code.io
  names:
    kind: App
    listKind: AppList
    plural: apps
    shortNames:
      - app
    singular: app
  scope: Namespaced
  versions:
    - additionalPrinterColumns:
        - jsonPath: .spec.appID
          name: App ID
          type: integer
        - jsonPath: .spec.installationID
          name: Installation ID
          type: integer
        - jsonPath: .spec.provider
          name: Provider
          type: string
        - jsonPath: .status.conditions[?(@.type=="Ready")].status
          name: Ready
          type: string
        - jsonPath: .metadata.creationTimestamp
          name: Age
          type: date
      name: v1
      schema:
        openAPIV3Schema:
          description: |-
            App is the Schema for the apps API; it encapsulates a GitHub App
            configuration that Tokens and ClusterTokens may reference via spec.appRef.
          properties:
            apiVersion:
              description: |-
                APIVersion defines the versioned schema of this representation of an object.
                Servers should convert recognized schemas to the latest internal value, and
                may reject unrecognized values.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
              type: string
            kind:
              description: |-
                Kind is a string value representing the REST resource this object represents.
                Servers may infer this from the endpoint the client submits requests to.
                Cannot be updated.
                In CamelCase.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
              type: string
            metadata:
              type: object
            spec:
              description: |-
                AppSpec defines the desired state of an App.

                Provider selects how the App's RSA private key is materialised. For cloud
                KMS (aws/azure/gcp/vault) the key reference is supplied inline via Key.
                For "secret" the key bytes live in a same-namespace Secret named by
                KeyRef; this is the only supported way to use an inline PEM with an App,
                because allowing arbitrary filesystem paths from a namespaced resource
                would let any namespace owner read key material mounted on the controller
                Pod.
              properties:
                appID:
                  description: The AppID of the GitHub App.
                  example: 12345
                  format: int64
                  minimum: 1
                  type: integer
                installationID:
                  description: |-
                    The default InstallationID of the GitHub App; Tokens/ClusterTokens may
                    override this via spec.installationID to target a different installation.
                  example: 123456789
                  format: int64
                  minimum: 1
                  type: integer
                key:
                  description: |-
                    Cloud-KMS key reference. Required when provider is "aws", "azure",
                    "gcp", or "vault"; forbidden when provider is "secret". The exact
                    shape depends on the provider: KMS key alias/ID/ARN (aws), Azure Key
                    Vault key URL (azure), GCP KMS resource name (gcp), or Vault transit
                    sign path (vault).
                  type: string
                keyRef:
                  description: |-
                    Same-namespace Secret reference holding the PEM-encoded RSA private
                    key. Required when provider is "secret"; forbidden otherwise.
                  properties:
                    key:
                      default: private-key.pem
                      description: |-
                        Key within the Secret's data map containing the PEM-encoded RSA
                        private key. Defaults to "private-key.pem", which matches the
                        filename GitHub uses when downloading App keys.
                      type: string
                    name:
                      description: Name of the Secret in the App's namespace.
                      maxLength: 253
                      type: string
                  required:
                    - name
                  type: object
                provider:
                  description: |-
                    Private key provider. One of "secret" (PEM material in a same-namespace
                    Secret, referenced by keyRef), "aws" (AWS KMS), "azure" (Azure Key
                    Vault), "gcp" (Google Cloud KMS), or "vault" (HashiCorp Vault transit).
                    The "file" provider is intentionally not supported on an App; use the
                    operator's startup configuration for file-based keys.
                  enum:
                    - secret
                    - aws
                    - azure
                    - gcp
                    - vault
                  type: string
                validateKey:
                  default: false
                  description: |-
                    If true, the operator validates the private key at reconcile time by
                    attempting a test sign. Failures surface as a KeyValid=False condition.
                  type: boolean
              required:
                - appID
                - installationID
                - provider
              type: object
              x-kubernetes-validations:
                - message: keyRef must be set if and only if provider is 'secret'
                  rule: (self.provider == 'secret') == has(self.keyRef)
                - message: key must be set if and only if provider is not 'secret'
                  rule: (self.provider != 'secret') == has(self.key)
            status:
              description: AppStatus defines the observed state of an App.
              properties:
                conditions:
                  items:
                    description:
                      Condition contains details for one aspect of the current
                      state of this API Resource.
                    properties:
                      lastTransitionTime:
                        description: |-
                          lastTransitionTime is the last time the condition transitioned from one status to another.
                          This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                        format: date-time
                        type: string
                      message:
                        description: |-
                          message is a human readable message indicating details about the transition.
                          This may be an empty string.
                        maxLength: 32768
                        type: string
                      observedGeneration:
                        description: |-
                          observedGeneration represents the .metadata.generation that the condition was set based upon.
                          For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                          with respect to the current state of the instance.
                        format: int64
                        minimum: 0
                        type: integer
                      reason:
                        description: |-
                          reason contains a programmatic identifier indicating the reason for the condition's last transition.
                          Producers of specific condition types may define expected values and meanings for this field,
                          and whether the values are considered a guaranteed API.
                          The value should be a CamelCase string.
                          This field may not be empty.
                        maxLength: 1024
                        minLength: 1
                        pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                        type: string
                      status:
                        description: status of the condition, one of True, False, Unknown.
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                        type: string
                      type:
                        description: type of condition in CamelCase or in foo.example.com/CamelCase.
                        maxLength: 316
                        pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                        type: string
                    required:
                      - lastTransitionTime
                      - message
                      - reason
                      - status
                      - type
                    type: object
                  type: array
                observedGeneration:
                  format: int64
                  type: integer
              type: object
          type: object
      served: true
      storage: true
      subresources:
        status: {}
