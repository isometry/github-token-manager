---
config:
  app_id: 0
  installation_id: 0
  provider: aws
  key: alias/github-token-manager
  # validate_key: validate key accessibility and suitability for signing on startup
  validate_key: false

# Common values
commonLabels: ~
commonAnnotations: ~
nameOverride: ~
fullnameOverride: ~

## namespace: defaults to the namespace where the chart is deployed if not specified
namespace: ~

## crds
##   install: true | false
##     true: install the CRDs
##     false: do not install the CRDs
##   keep: true | false
##     true: prevent helm from deleting the CRDs when the chart is deleted
##     false: allow helm to delete the CRDs when the chart is deleted
crds:
  install: true
  keep: true

## rbac
##   create: true | false
##     true: create the RBAC resources
##     false: do not create the RBAC resources
rbac:
  install: true
  serviceAccount:
    annotations: {}

## metrics:
##   enabled: true | false
##   listen:
##     port: port number for --metrics-bind-address=:<port>
##   secure: true | false (controls --metrics-secure flag; false = plain HTTP)
##   service:
##     type: ClusterIP | NodePort | LoadBalancer | ExternalName
metrics:
  enabled: true
  listen:
    port: 8080
  secure: false
  service:
    type: ClusterIP

## manager
##   repository: image repository
##   tag: image tag
##   replicas: number of replicas
##   annotations: map of annotations (optional)
##   tolerations: list of tolerations (optional)
##   nodeSelector: node selector (optional)
##   env: list of additional environment variables to set on the manager container
##   resources: manager container resource requests and limits
## manager
##   repository: image repository
##   tag: image tag
##   replicas: number of replicas
##   extraArgs: map of additional CLI flags rendered as --key=value
manager:
  repository: ghcr.io/isometry/github-token-manager
  tag: ~ # defaults to chart appVersion
  replicas: 1
  annotations: {}
  tolerations: ~
  nodeSelector: ~
  # additional environment variables to set on the controller container
  # e.g. `[{name: VAULT_ADDR, value: http://vault:8200}]`
  env: []
  extraArgs: {}
  resources:
    limits:
      cpu: 500m
      memory: 384Mi
    requests:
      cpu: 5m
      memory: 64Mi
